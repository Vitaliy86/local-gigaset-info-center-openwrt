name: Build Go Binary + Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Build Go binaries for all target architectures ──────────────────────────
  build-binary:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # BPIR4, RPi4, modern ARM routers
          - name: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ""
            gomips: ""
          # Older 32-bit ARM routers
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            gomips: ""
          # x86 routers / VMs
          - name: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ""
            gomips: ""
          # Classic MIPS routers (softfloat)
          - name: linux-mipsle-sf
            goos: linux
            goarch: mipsle
            goarm: ""
            gomips: softfloat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build static binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          GOMIPS:      ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-dev}" \
            -o gigaset-info-center-${{ matrix.name }} \
            .

          ls -lah gigaset-info-center-${{ matrix.name }}
          file  gigaset-info-center-${{ matrix.name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: gigaset-info-center-${{ matrix.name }}
          retention-days: 1

  # ── Create GitHub Release with all binaries (on tag push) ──────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-binary
    runs-on: ubuntu-latest

    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lah dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
