name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-apk:
    name: Package APK (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - armv7
          - mips_sf

    container:
      image: alpine:3.22

    steps:
      - name: Install base packages
        run: |
          apk update
          apk add \
            alpine-sdk \
            apk-tools \
            sudo \
            git \
            bash \
            fakeroot \
            build-base

      - name: Init APK database
        run: |
          mkdir -p /var/lib/apk
          touch /var/lib/apk/world
          apk update

      - name: Create builder user
        run: |
          adduser -D builder
          addgroup builder abuild
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare abuild
        run: |
          mkdir -p /home/builder/.abuild
          chown -R builder:builder /home/builder

          su builder -c "
            abuild-keygen -a -i -n
          "
          # Ensure the user is explicitly in the group for the current session
          su builder -c "id -Gn | grep -q abuild || usermod -aG abuild builder"
          # Ensure membership is recognized in the current shell context if needed,
          # but su -c should handle it. We'll also ensure group exists.

      - name: Prepare package tree
        run: |
          mkdir -p /home/builder/package
          cp -r . /home/builder/package/
          chown -R builder:builder /home/builder/package

      - name: Build APK
        run: |
          su builder -c "
            cd /home/builder/package

            export CARCH=${{ matrix.arch }}

            mkdir -p packages

            abuild checksum || true
            abuild -r
          "

      - name: Collect APK artifacts
        run: |
          mkdir -p /artifacts
          find /home/builder/packages -name '*.apk' -exec cp {} /artifacts/ \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: /artifacts/*.apk

  build-openwrt:
    name: Package OpenWrt IPK
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git ~/openwrt

      - name: Update feeds
        run: |
          cd ~/openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package
        run: |
          mkdir -p ~/openwrt/package/local/gigaset-info-center
          cp -r ./* ~/openwrt/package/local/gigaset-info-center/

      - name: Configure OpenWrt
        run: |
          cd ~/openwrt

          make defconfig

      - name: Build package
        run: |
          cd ~/openwrt

          make package/local/gigaset-info-center/compile V=s -j1

      - name: Collect IPK artifacts
        run: |
          mkdir -p artifacts

          find ~/openwrt/bin/packages -name '*.ipk' -exec cp {} artifacts/ \;

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk
          path: artifacts/*.ipk
