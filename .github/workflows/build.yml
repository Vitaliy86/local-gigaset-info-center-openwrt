name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Stage 1: compile Go binaries for all target architectures ──────────────
  build-binary:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ""
            gomips: ""
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            gomips: ""
          - name: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ""
            gomips: ""
          - name: linux-mipsle-sf
            goos: linux
            goarch: mipsle
            goarm: ""
            gomips: softfloat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build static binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          GOMIPS:      ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-dev}" \
            -o gigaset-info-center-${{ matrix.name }} \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: gigaset-info-center-${{ matrix.name }}
          retention-days: 1

  # ── Stage 2: package each binary into an APK ──────────────────────────────
  build-apk:
    needs: build-binary
    name: Package APK (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - armv7
          - mips_sf

    container:
      image: alpine:3.22

    steps:
      - name: Install base packages
        run: |
          apk update
          apk add \
            alpine-sdk \
            apk-tools \
            sudo \
            git \
            bash \
            fakeroot \
            build-base

      - name: Init APK database
        run: |
          mkdir -p /var/lib/apk
          touch /var/lib/apk/world
          apk update

      - name: Create builder user
        run: |
          adduser -D builder
          addgroup builder abuild
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare abuild
        run: |
          mkdir -p /home/builder/.abuild
          chown -R builder:builder /home/builder

          su builder -c "
            abuild-keygen -a -i -n
          "
          # Ensure the user is explicitly in the group for the current session
          su builder -c "id -Gn | grep -q abuild || usermod -aG abuild builder"
          # Ensure membership is recognized in the current shell context if needed,
          # but su -c should handle it. We'll also ensure group exists.

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-${{ matrix.arch == 'x86_64' && 'amd64' || matrix.arch == 'aarch64' && 'arm64' || matrix.arch == 'armv7' && 'armv7' || matrix.arch == 'mips_sf' && 'mipsle-sf' || matrix.arch }}
          path: /tmp/bin

      - name: Prepare package tree
        run: |
          mkdir -p /home/builder/package
          cp -r . /home/builder/package/
          chmod +x "/tmp/bin/gigaset-info-center-linux-${{ matrix.arch == 'x86_64' && 'amd64' || matrix.arch == 'aarch64' && 'arm64' || matrix.arch == 'armv7' && 'armv7' || matrix.arch == 'mips_sf' && 'mipsle-sf' || matrix.arch }}"
          cp "/tmp/bin/gigaset-info-center-linux-${{ matrix.arch == 'x86_64' && 'amd64' || matrix.arch == 'aarch64' && 'arm64' || matrix.arch == 'armv7' && 'armv7' || matrix.arch == 'mips_sf' && 'mipsle-sf' || matrix.arch }}" \
             /home/builder/package/gigaset-info-center
          chown -R builder:builder /home/builder/package

      - name: Build APK
        run: |
          su builder -c "
            cd /home/builder/package

            export CARCH=${{ matrix.arch }}

            mkdir -p packages

            abuild checksum || true
            abuild -r
          "

      - name: Collect APK artifacts
        run: |
          mkdir -p /artifacts
          find /home/builder/packages -name '*.apk' -exec cp {} /artifacts/ \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: /artifacts/*.apk

  build-openwrt:
    name: Package OpenWrt IPK
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git ~/openwrt

      - name: Update feeds
        run: |
          cd ~/openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package
        run: |
          mkdir -p ~/openwrt/package/local/gigaset-info-center
          cp -r ./* ~/openwrt/package/local/gigaset-info-center/

      - name: Copy package to OpenWrt
        run: |
          mkdir -p ~/openwrt/package/feeds/local/gigaset-info-center
          cp -r $GITHUB_WORKSPACE/* ~/openwrt/package/feeds/local/gigaset-info-center/

      - name: Add local feed configuration
        run: |
          echo "src/file file:///home/runner/openwrt/package/feeds/local" >> ~/openwrt/include/feeds.conf

      - name: Configure OpenWrt
        run: |
          cd ~/openwrt

          # Update feeds and install our package
          ./scripts/feeds update
          ./scripts/feeds install -a

          # Enable the package in config
          echo "CONFIG_PACKAGE_gigaset-info-center=y" >> .config

          make defconfig

      - name: Build package
        run: |
          cd ~/openwrt

          make package/gigaset-info-center/compile V=s -j1

      - name: Collect IPK artifacts
        run: |
          mkdir -p artifacts

          find ~/openwrt/bin/packages -name '*.ipk' -exec cp {} artifacts/ \;

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk
          path: artifacts/*.ipk
