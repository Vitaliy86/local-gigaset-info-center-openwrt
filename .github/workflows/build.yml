name: Build Go Binary + APK Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Stage 1: compile Go binaries for all target architectures ──────────────
  build-binary:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-arm64
            goos: linux
            goarch: arm64
            goarm: ""
            gomips: ""
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            gomips: ""
          - name: linux-amd64
            goos: linux
            goarch: amd64
            goarm: ""
            gomips: ""
          - name: linux-mipsle-sf
            goos: linux
            goarch: mipsle
            goarm: ""
            gomips: softfloat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build static binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          GOMIPS:      ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-dev}" \
            -o gigaset-info-center-${{ matrix.name }} \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: gigaset-info-center-${{ matrix.name }}
          retention-days: 1

  # ── Stage 2: package each binary into an APK ──────────────────────────────
  build-apk:
    name: Package APK (${{ matrix.apkarch }})
    needs: build-binary
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    strategy:
      matrix:
        include:
          - name: linux-arm64
            apkarch: aarch64
          - name: linux-armv7
            apkarch: armv7
          - name: linux-amd64
            apkarch: x86_64
          - name: linux-mipsle-sf
            apkarch: mips_sf

    steps:
      - name: Install build tools
        run: apk add --no-cache alpine-sdk sudo

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: /tmp/bin

      - name: Create staging directory for APKBUILD
        run: |
          mkdir -p /home/builder/apkbuild-staging
          cp "$GITHUB_WORKSPACE/APKBUILD" /home/builder/apkbuild-staging/
          cp "$GITHUB_WORKSPACE/gigaset-info-center.conf.example" \
             /home/builder/apkbuild-staging/
          cp "$GITHUB_WORKSPACE/gigaset-info-center.init" \
             /home/builder/apkbuild-staging/
          chmod +x "/tmp/bin/gigaset-info-center-${{ matrix.name }}"
          cp "/tmp/bin/gigaset-info-center-${{ matrix.name }}" \
             /home/builder/apkbuild-staging/gigaset-info-center

      - name: Setup abuild user
        run: |
          adduser -D builder
          addgroup builder abuild
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder /home/builder/apkbuild-staging

      - name: Generate signing key
        run: |
          su builder -c "abuild-keygen -a -n"
          find /home/builder/.abuild -name '*.pub' \
             -exec cp {} /etc/apk/keys/ \;

      - name: Initialize apk database
        run: |
          mkdir -p /var/db/pkg
          mkdir -p /var/lib/apk
          echo "https://dl-cdn.alpinelinux.org/alpine/v3.21/main" > /etc/apk/repositories
          touch /var/lib/apk/db.lock
          chmod 755 /var/lib/apk
          chown root:root /var/db/pkg
          # Create empty package database file
          touch /var/db/pkg/.installed

      - name: Build APK
        run: |
          su builder -c "
            cd /home/builder/apkbuild-staging &&
            CARCH=${{ matrix.apkarch }} abuild -F -d -P /home/builder/packages
          "

      - name: Show result
        run: find /home/builder/packages -name '*.apk' -exec ls -lah {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.apkarch }}
          path: /home/builder/packages/**/*.apk
          retention-days: 30

  # ── Stage 3: attach all APKs to a GitHub Release (on tag push) ────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -name '*.apk' | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
