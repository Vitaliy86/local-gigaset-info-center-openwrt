name: Build Alpine/OpenWRT Package (.apk)

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PKG_NAME: gigaset-info-center
  PKG_VER: 1.7
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build .apk Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Create staging directory
        run: |
          mkdir -p "build-stage/${{ env.PKG_NAME }}/srv/gigaset-info-center/icons"
          mkdir -p "build-stage/${{ env.PKG_NAME }}/etc/lighttpd"
          mkdir -p "build-stage/${{ env.PKG_NAME }}/etc/init.d"
          mkdir -p "build-stage/${{ env.PKG_NAME }}/usr/share/doc/${{ env.PKG_NAME }}"

      - name: Copy web application files
        run: |
          cp index.php build-stage/${{ env.PKG_NAME }}/srv/gigaset-info-center/
          cp weather.php build-stage/${{ env.PKG_NAME }}/srv/gigaset-info-center/
          cp proxy.php build-stage/${{ env.PKG_NAME }}/srv/gigaset-info-center/

      - name: Copy icons
        run: |
          for icon in icons/*.png; do
            cp "$icon" "build-stage/${{ env.PKG_NAME }}/srv/gigaset-info-center/icons/"
          done

      - name: Copy configuration files
        run: |
          cp etc/lighttpd/${{ env.PKG_NAME }}.conf build-stage/${{ env.PKG_NAME }}/etc/lighttpd/
          cp etc/gigaset-env.example build-stage/${{ env.PKG_NAME }}/etc/

      - name: Copy init script and documentation
        run: |
          cp ${{ env.PKG_NAME }}.init "build-stage/${{ env.PKG_NAME }}/etc/init.d/${{ env.PKG_NAME }}"
          chmod 755 "build-stage/${{ env.PKG_NAME }}/etc/init.d/${{ env.PKG_NAME }}"
          cp LICENSE README.md "build-stage/${{ env.PKG_NAME }}/usr/share/doc/${{ env.PKG_NAME }}/"

      - name: Build valid .apk package
        id: create-package
        run: |
          cd build-stage
          
          # Install apk-tools to create valid .apk packages
          apk add --no-cache apk-tools
          
          # Create .PKGINFO control file
          echo "pkgname = ${{ env.PKG_NAME }}" > .PKGINFO
          echo "pkgver = ${{ env.PKG_VER }}-r0" >> .PKGINFO
          echo "arch = noarch" >> .PKGINFO
          echo "license = AGPL-3.0-or-later" >> .PKGINFO
          echo "url = https://github.com/Vitaliy86/local-gigaset-info-center-openwrt" >> .PKGINFO
          echo "maintainer = Vitaliy86 <vitaliy86@github.com>" >> .PKGINFO
          echo "description = Replacement weather service for Gigaset IP handsets" >> .PKGINFO
          echo "depends = php lighttpd php-curl php-gd" >> .PKGINFO
          echo "options = !strip" >> .PKGINFO
          
          # Create valid .apk package using apk-tools
          # apk-tools creates: data.tar.xz + control.tar.xz with proper format
          apk add --root / --virtual .build-deps --no-scripts .
          
          # Use apk-tools to create the package properly
          # First create the package structure
          mkdir -p _apk_control
          cp .PKGINFO _apk_control/.PKGINFO
          
          # Create control.tar.xz (apk-tools uses xz compression)
          tar cJf control.tar.xz -C _apk_control .
          rm -rf _apk_control
          
          # Create data.tar.xz
          tar cJf data.tar.xz ${{ env.PKG_NAME }}
          
          # Combine into .apk (apk format = data.tar.xz + control.tar.xz)
          cat data.tar.xz control.tar.xz > ${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk
          
          # Clean up intermediate files
          rm -f data.tar.xz control.tar.xz .PKGINFO
          
          # Verify the package was created
          ls -la ${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk
          
          echo "package_name=${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.PKG_NAME }}-apk
          path: build-stage/${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk
          retention-days: 30
      
      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-stage/${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-openwrt:
    name: Test Package Structure
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.PKG_NAME }}-apk
      
      - name: Verify package structure
        run: |
          mkdir test-extract
          tar xf ${{ env.PKG_NAME }}-${{ env.PKG_VER }}.apk -C test-extract
          
          echo "Package contents:"
          find test-extract -type f
          
          # Check essential files exist
          test -f test-extract/gigaset-info-center/index.php || exit 1
          test -f test-extract/gigaset-info-center/weather.php || exit 1
          test -f test-extract/gigaset-info-center/proxy.php || exit 1
          test -d test-extract/gigaset-info-center/icons || exit 1
          
          # Check control.tar.gz exists
          test -f test-extract/.PKGINFO || exit 1
          
          echo "Package structure verified successfully!"
