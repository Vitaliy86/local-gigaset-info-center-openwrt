name: Build OpenWrt APK Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PKG_NAME: gigaset-info-center
  PKG_VER: "1.7"

jobs:
  build:
    name: Build .apk Package
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21

    steps:
      - name: Install build tools
        run: apk add --no-cache alpine-sdk sudo

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build user
        run: |
          adduser -D builder
          addgroup builder abuild
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          # Даём builder доступ к исходникам
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Generate signing key
        
        run: |
          su builder -c "abuild-keygen -n"
          # Устанавливаем публичный ключ как root — apk начнёт доверять пакету
          cp /home/builder/.abuild/*.pub /etc/apk/keys/
     
      - name: Build package
        run: |
          # -d = skip dependency checking (deps are OpenWrt-specific, not in Alpine repos)
          su builder -c "cd '$GITHUB_WORKSPACE' && abuild -F -d -P /home/builder/packages"
      
      - name: Collect artifact
        id: pkg
        run: |
          APK=$(find /home/builder/packages -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -lah "$APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-apk
          path: ${{ steps.pkg.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    name: Verify Package
    needs: build
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-apk
          path: /tmp/pkg

      - name: Verify APK is valid
        run: |
          APK=$(find /tmp/pkg -name '*.apk' | head -1)
          echo "Verifying: $APK"
          tar tzf "$APK" | head -20
          tar xzf "$APK" .PKGINFO -O
          echo "✅ Package OK"
