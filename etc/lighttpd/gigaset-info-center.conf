# Gigaset Info Center - Lighttpd Configuration for OpenWRT
# Place this file in /etc/lighttpd/ and add it to the config include list

server.document-root = "/srv/gigaset-info-center"
server.bind = "127.0.0.1"
server.port = ${GIGASET_PORT:-8081}
server.chroot = "/"

index-file.names = "index.php"
index-file.exclude = ".html"

# PHP-CGI configuration
fastcgi.server = (
    ".php" => ((
        "host" => "127.0.0.1",
        "port" => "8080",
        "check-interval" => 30,
        "max-pool-size" => 5,
        "bin-path" => "/usr/bin/php-cgi"
    ))
)

# URL rewriting for Gigaset compatibility
url.rewrite-once = (
    "^/info/menu\\.jsp$" => "/index.php",
    "^/info/request\\.do$" => "/index.php",
    "^/proxy/image\\.do$" => "/proxy.php",
)

# Static file caching
$HTTP["url"] =~ "\\.png$" {
    url.cache-control = "public, max-age=3600"
}
